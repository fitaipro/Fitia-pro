<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer un compte — FitAI Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Fit<span>AI</span><em>·</em>Pro</a>
    <div></div>
    <div></div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Fit<span>AI</span>·Pro</div>
    <h1 class="auth-title">Créer un compte</h1>
    <p class="auth-sub">Sauvegarde tes programmes et suis ta progression</p>

    <!-- Badge plan -->
    <div class="plan-badge" id="plan-display">Plan Starter — Gratuit</div>

    <div class="auth-error" id="signup-error"></div>
    <div class="auth-success" id="signup-success"></div>

    <div class="auth-field">
      <label>Prénom & Nom</label>
      <input type="text" id="signup-name" placeholder="Ex: Ahmed Benali" autocomplete="name">
    </div>
    <div class="auth-field">
      <label>Adresse email</label>
      <input type="email" id="signup-email" placeholder="ton@email.com" autocomplete="email">
    </div>
    <div class="auth-field">
      <label>Mot de passe</label>
      <input type="password" id="signup-password" placeholder="6 caractères minimum" autocomplete="new-password">
    </div>

    <button class="auth-btn" onclick="handleSignup()">Créer mon compte →</button>

    <div class="auth-divider">ou</div>
    <div class="auth-switch">Déjà un compte ? <a href="login.html">Se connecter</a></div>

    <p style="font-size:11px;color:var(--muted);text-align:center;margin-top:18px;line-height:1.6;">
      En créant un compte, tu acceptes nos <a href="privacy.html" style="color:var(--accent)">CGU et Politique de confidentialité</a>.
    </p>
  </div>
</div>

<script src="app.js"></script>
<script>
  // Afficher le plan sélectionné depuis la page tarifs
  const urlParams = new URLSearchParams(window.location.search);
  const plan = urlParams.get('plan');
  if (plan === 'pro') {
    document.getElementById('plan-display').textContent = '⭐ Plan Pro — 12€/mois · 7 jours gratuit';
    document.getElementById('plan-display').style.background = 'rgba(108,71,255,.2)';
  }
</script>
</body>
</html>
